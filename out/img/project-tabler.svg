<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="tb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#12101f"/>
    </linearGradient>
    <linearGradient id="tb-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.9"/>
    </linearGradient>
    <radialGradient id="tb-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#tb-bg)"/>
  <!-- Background pattern dots -->
  <g fill="#8b5cf6" fill-opacity="0.06">
    <circle cx="50" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="350" cy="50" r="2"/><circle cx="450" cy="50" r="2"/><circle cx="550" cy="50" r="2"/><circle cx="650" cy="50" r="2"/><circle cx="750" cy="50" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="250" cy="150" r="2"/><circle cx="350" cy="150" r="2"/><circle cx="450" cy="150" r="2"/><circle cx="550" cy="150" r="2"/><circle cx="650" cy="150" r="2"/><circle cx="750" cy="150" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="150" cy="250" r="2"/><circle cx="250" cy="250" r="2"/><circle cx="350" cy="250" r="2"/><circle cx="450" cy="250" r="2"/><circle cx="550" cy="250" r="2"/><circle cx="650" cy="250" r="2"/><circle cx="750" cy="250" r="2"/>
    <circle cx="50" cy="350" r="2"/><circle cx="150" cy="350" r="2"/><circle cx="250" cy="350" r="2"/><circle cx="350" cy="350" r="2"/><circle cx="450" cy="350" r="2"/><circle cx="550" cy="350" r="2"/><circle cx="650" cy="350" r="2"/><circle cx="750" cy="350" r="2"/>
    <circle cx="50" cy="430" r="2"/><circle cx="150" cy="430" r="2"/><circle cx="250" cy="430" r="2"/><circle cx="350" cy="430" r="2"/><circle cx="450" cy="430" r="2"/><circle cx="550" cy="430" r="2"/><circle cx="650" cy="430" r="2"/><circle cx="750" cy="430" r="2"/>
  </g>
  <ellipse cx="400" cy="225" rx="280" ry="160" fill="url(#tb-glow)"/>
  <!-- Database cylinder shapes -->
  <g fill="none" stroke="url(#tb-accent)" stroke-width="2">
    <!-- PostgreSQL -->
    <ellipse cx="180" cy="140" rx="60" ry="18"/>
    <path d="M120,140 L120,260 Q120,278 180,278 Q240,278 240,260 L240,140"/>
    <ellipse cx="180" cy="260" rx="60" ry="18"/>
    <path d="M120,190 Q180,208 240,190" stroke-opacity="0.5"/>
    <path d="M120,220 Q180,238 240,220" stroke-opacity="0.5"/>
    <!-- MySQL / SQLite -->
    <ellipse cx="400" cy="120" rx="50" ry="15"/>
    <path d="M350,120 L350,220 Q350,235 400,235 Q450,235 450,220 L450,120"/>
    <ellipse cx="400" cy="220" rx="50" ry="15"/>
    <path d="M350,165 Q400,180 450,165" stroke-opacity="0.5"/>
    <path d="M350,195 Q400,210 450,195" stroke-opacity="0.5"/>
    <!-- MongoDB -->
    <ellipse cx="620" cy="160" rx="55" ry="16"/>
    <path d="M565,160 L565,270 Q565,286 620,286 Q675,286 675,270 L675,160"/>
    <ellipse cx="620" cy="270" rx="55" ry="16"/>
    <path d="M565,200 Q620,216 675,200" stroke-opacity="0.5"/>
    <path d="M565,230 Q620,246 675,230" stroke-opacity="0.5"/>
  </g>
  <!-- Connection lines between DBs -->
  <g stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.15" fill="none">
    <line x1="240" y1="200" x2="350" y2="170"/>
    <line x1="450" y1="170" x2="565" y2="200"/>
    <line x1="180" y1="260" x2="300" y2="340"/>
    <line x1="400" y1="220" x2="550" y2="300"/>
    <line x1="620" y1="270" x2="700" y2="340"/>
  </g>
  <!-- Small data points -->
  <g fill="#8b5cf6" fill-opacity="0.4">
    <circle cx="180" cy="278" r="3"/>
    <circle cx="400" cy="235" r="3"/>
    <circle cx="620" cy="286" r="3"/>
  </g>
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#8b5cf6" fill-opacity="0.6" text-anchor="middle" font-weight="500">CROSS-PLATFORM DATABASE CLIENT</text>
</svg>
