<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="ss-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <linearGradient id="ss-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.9"/>
    </linearGradient>
    <radialGradient id="ss-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#ss-bg)"/>
  <ellipse cx="400" cy="220" rx="280" ry="170" fill="url(#ss-glow)"/>
  <!-- WiFi/Signal waves top -->
  <g transform="translate(400,80)" stroke="#22d3ee" fill="none" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round">
    <path d="M-30,0 Q0,-20 30,0" />
    <path d="M-50,0 Q0,-40 50,0" />
    <path d="M-70,0 Q0,-60 70,0" />
    <circle cx="0" cy="0" r="8" fill="#22d3ee" fill-opacity="0.5"/>
  </g>
  <!-- Central hub / router -->
  <g transform="translate(400,200)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#ss-accent)" stroke-width="2" stroke-opacity="0.4"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#ss-accent)" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="12" fill="#22d3ee" fill-opacity="0.3" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.8"/>
    <!-- Radiating lines -->
    <g stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2">
      <line x1="-45" y1="0" x2="-120" y2="0"/>
      <line x1="45" y1="0" x2="120" y2="0"/>
      <line x1="0" y1="-45" x2="0" y2="-120"/>
      <line x1="-32" y1="-32" x2="-85" y2="-85"/>
      <line x1="32" y1="-32" x2="85" y2="-85"/>
    </g>
  </g>
  <!-- Smart device nodes -->
  <!-- Node 1 - bulb (smart light) -->
  <g transform="translate(150,160)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M-8,0 Q-8,-10 0,-12 Q8,-10 8,0 Q8,8 0,10 Q-8,8 -8,0" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="-5" y1="10" x2="5" y2="10" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="0" y1="-20" x2="0" y2="-35" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3 3"/>
  </g>
  <!-- Node 2 - fan/switch -->
  <g transform="translate(650,160)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
    <g transform="translate(0,0)">
      <line x1="0" y1="-8" x2="0" y2="-15" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round" transform="rotate(0)"/>
      <line x1="0" y1="-8" x2="0" y2="-15" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round" transform="rotate(120)"/>
      <line x1="0" y1="-8" x2="0" y2="-15" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round" transform="rotate(240)"/>
    </g>
    <line x1="0" y1="-20" x2="0" y2="-35" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3 3"/>
  </g>
  <!-- Node 3 - phone -->
  <g transform="translate(150,300)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="-8" y="-12" width="16" height="24" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="0" cy="9" r="2" fill="#22d3ee" fill-opacity="0.5"/>
    <line x1="0" y1="-20" x2="0" y2="-35" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3 3"/>
  </g>
  <!-- Node 4 - computer -->
  <g transform="translate(650,300)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="-10" y="-8" width="20" height="14" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="0" y1="6" x2="0" y2="12" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="-8" y1="12" x2="8" y2="12" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="0" y1="-20" x2="0" y2="-35" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3 3"/>
  </g>
  <!-- Connecting lines to hub -->
  <g stroke="#22d3ee" stroke-width="1" stroke-opacity="0.08" fill="none">
    <line x1="165" y1="160" x2="355" y2="200"/>
    <line x1="635" y1="160" x2="445" y2="200"/>
    <line x1="165" y1="300" x2="355" y2="200"/>
    <line x1="635" y1="300" x2="445" y2="200"/>
  </g>
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#22d3ee" fill-opacity="0.6" text-anchor="middle" font-weight="500">IoT SMART HOME CONTROL</text>
</svg>
