<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="ur-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="ur-accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ur-accent2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.1"/>
    </linearGradient>
    <radialGradient id="ur-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#ur-bg)"/>
  <!-- Grid pattern -->
  <g stroke="#10b981" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Glow -->
  <ellipse cx="400" cy="225" rx="300" ry="180" fill="url(#ur-glow)"/>
  <!-- City nodes -->
  <g fill="none" stroke="url(#ur-accent1)" stroke-width="1.5">
    <circle cx="200" cy="120" r="8"/>
    <circle cx="350" cy="80" r="6"/>
    <circle cx="500" cy="150" r="10"/>
    <circle cx="600" cy="100" r="7"/>
    <circle cx="150" cy="280" r="9"/>
    <circle cx="400" cy="200" r="12"/>
    <circle cx="550" cy="300" r="8"/>
    <circle cx="680" cy="250" r="6"/>
    <circle cx="300" cy="350" r="7"/>
    <circle cx="480" cy="380" r="5"/>
  </g>
  <!-- Connecting lines -->
  <g stroke="#10b981" stroke-opacity="0.2" stroke-width="1" fill="none">
    <line x1="200" y1="120" x2="350" y2="80"/>
    <line x1="350" y1="80" x2="500" y2="150"/>
    <line x1="500" y1="150" x2="600" y2="100"/>
    <line x1="200" y1="120" x2="150" y2="280"/>
    <line x1="400" y1="200" x2="200" y2="120"/>
    <line x1="400" y1="200" x2="500" y2="150"/>
    <line x1="400" y1="200" x2="550" y2="300"/>
    <line x1="550" y1="300" x2="680" y2="250"/>
    <line x1="400" y1="200" x2="300" y2="350"/>
    <line x1="400" y1="200" x2="480" y2="380"/>
    <line x1="150" y1="280" x2="300" y2="350"/>
  </g>
  <!-- Label -->
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#10b981" fill-opacity="0.6" text-anchor="middle" font-weight="500">SMART CITY INTELLIGENCE</text>
</svg>
