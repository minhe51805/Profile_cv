<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="mm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f1a2a"/>
    </linearGradient>
    <linearGradient id="mm-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.9"/>
    </linearGradient>
    <radialGradient id="mm-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#mm-bg)"/>
  <ellipse cx="400" cy="220" rx="280" ry="170" fill="url(#mm-glow)"/>
  <!-- Mountain / challenge theme -->
  <g transform="translate(400,240)">
    <!-- Mountain peaks -->
    <polygon points="0,-120 -120,0 120,0" fill="none" stroke="url(#mm-accent)" stroke-width="2" stroke-opacity="0.4"/>
    <polygon points="-80,-60 -200,40 40,40" fill="none" stroke="url(#mm-accent)" stroke-width="1.5" stroke-opacity="0.3"/>
    <polygon points="80,-60 40,40 200,40" fill="none" stroke="url(#mm-accent)" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- Snow caps -->
    <polygon points="0,-120 -20,-100 0,-90 20,-100" fill="#06b6d4" fill-opacity="0.2"/>
    <!-- Flag at summit -->
    <line x1="0" y1="-120" x2="0" y2="-150" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="0" y="-150" width="25" height="15" rx="1" fill="#06b6d4" fill-opacity="0.5"/>
    <!-- Path up the mountain -->
    <path d="M-80,80 Q-40,40 0,80 Q40,120 80,80" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4 4"/>
    <!-- Checkpoint flags along path -->
    <circle cx="-60" cy="40" r="4" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle cx="0" cy="80" r="4" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="60" cy="40" r="4" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.4"/>
    <!-- Base line -->
    <line x1="-150" y1="40" x2="150" y2="40" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.15"/>
  </g>
  <!-- Timer / clock element -->
  <g transform="translate(620,120)" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-opacity="0.4">
    <circle cx="0" cy="0" r="25"/>
    <line x1="0" y1="0" x2="0" y2="-15" stroke-opacity="0.8"/>
    <line x1="0" y1="0" x2="10" y2="5" stroke-opacity="0.8"/>
  </g>
  <!-- Trophy element -->
  <g transform="translate(180,120)" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-opacity="0.3">
    <path d="M-15,-15 L15,-15 L15,5 Q15,15 0,20 Q-15,15 -15,5 Z"/>
    <line x1="-15" y1="-15" x2="-20" y2="-20"/>
    <line x1="15" y1="-15" x2="20" y2="-20"/>
    <line x1="-8" y1="20" x2="-8" y2="30"/>
    <line x1="8" y1="20" x2="8" y2="30"/>
    <line x1="-12" y1="30" x2="12" y2="30"/>
  </g>
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#06b6d4" fill-opacity="0.6" text-anchor="middle" font-weight="500">24H HACKATHON CHALLENGE</text>
</svg>
