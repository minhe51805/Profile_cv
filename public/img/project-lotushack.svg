<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="lh-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a0d2e"/>
    </linearGradient>
    <linearGradient id="lh-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.9"/>
    </linearGradient>
    <radialGradient id="lh-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#lh-bg)"/>
  <!-- Subtle grid -->
  <g stroke="#f97316" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  <ellipse cx="400" cy="220" rx="280" ry="170" fill="url(#lh-glow)"/>
  <!-- Brain / AI center -->
  <g transform="translate(400,200)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#lh-accent)" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#lh-accent)" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#lh-accent)" stroke-width="2"/>
    <!-- Neural connections -->
    <g stroke="#f97316" stroke-width="1" stroke-opacity="0.3" fill="none">
      <line x1="-50" y1="0" x2="-70" y2="-30"/><circle cx="-70" cy="-30" r="4" fill="#f97316" fill-opacity="0.4"/>
      <line x1="50" y1="0" x2="70" y2="-30"/><circle cx="70" cy="-30" r="4" fill="#f97316" fill-opacity="0.4"/>
      <line x1="-50" y1="0" x2="-70" y2="30"/><circle cx="-70" cy="30" r="3" fill="#f97316" fill-opacity="0.3"/>
      <line x1="50" y1="0" x2="70" y2="30"/><circle cx="70" cy="30" r="3" fill="#f97316" fill-opacity="0.3"/>
      <line x1="0" y1="-50" x2="0" y2="-70"/><circle cx="0" cy="-70" r="4" fill="#f97316" fill-opacity="0.5"/>
      <line x1="0" y1="50" x2="0" y2="70"/><circle cx="0" cy="70" r="4" fill="#f97316" fill-opacity="0.5"/>
      <line x1="-35" y1="-35" x2="-50" y2="-50"/><circle cx="-50" cy="-50" r="3" fill="#f97316" fill-opacity="0.3"/>
      <line x1="35" y1="-35" x2="50" y2="-50"/><circle cx="50" cy="-50" r="3" fill="#f97316" fill-opacity="0.3"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#f97316" fill-opacity="0.8"/>
    <!-- Speech bubble -->
    <rect x="-60" y="75" width="120" height="30" rx="6" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="0" y1="75" x2="-10" y2="65" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="0" y1="75" x2="10" y2="65" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>
  <!-- "Edu" + "Path" label elements -->
  <g fill="none" stroke="#ec4899" stroke-opacity="0.15" stroke-width="1">
    <rect x="120" y="100" width="80" height="40" rx="4"/>
    <rect x="600" y="100" width="80" height="40" rx="4"/>
    <rect x="120" y="310" width="80" height="40" rx="4"/>
    <rect x="600" y="310" width="80" height="40" rx="4"/>
  </g>
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#f97316" fill-opacity="0.6" text-anchor="middle" font-weight="500">AI STUDY ABROAD COUNSELOR</text>
</svg>
